<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><title>Flight Proxy Test</title>
<style>body{background:#000913;color:#00d4ff;font-family:monospace;padding:20px;}
#log{background:#000d1a;border:1px solid #00d4ff33;padding:16px;font-size:11px;line-height:1.9;max-height:80vh;overflow-y:auto;}
.ok{color:#00ff88;}.err{color:#ff3d3d;}.info{color:#ffbb00;}</style>
</head>
<body>
<h3 style="letter-spacing:4px;margin-bottom:16px">// OPENSKY PROXY TEST //</h3>
<div id="log">Testing all proxies...</div>
<script>
var L=document.getElementById('log');
function add(msg,cls){var d=document.createElement('div');d.className=cls||'';d.textContent=msg;L.appendChild(d);L.scrollTop=L.scrollHeight;}

var TARGET = 'https://opensky-network.org/api/states/all';
var PROXIES = [
  {name:'allorigins raw',  url:'https://api.allorigins.win/raw?url='+encodeURIComponent(TARGET)},
  {name:'corsproxy.io',    url:'https://corsproxy.io/?'+encodeURIComponent(TARGET)},
  {name:'allorigins get',  url:'https://api.allorigins.win/get?url='+encodeURIComponent(TARGET)},
  {name:'htmldriven',      url:'https://yacdn.org/proxy/'+TARGET},
  {name:'direct (no proxy)', url:TARGET},
];

var done=0;
PROXIES.forEach(function(p,i){
  setTimeout(function(){
    add('── Testing: '+p.name,'info');
    var xhr=new XMLHttpRequest();
    xhr.open('GET',p.url,true); xhr.timeout=10000;
    xhr.onload=function(){
      var ok=xhr.status===200&&xhr.responseText.length>100;
      var hasStates=xhr.responseText.indexOf('"states"')>-1||xhr.responseText.indexOf('states')>-1;
      add((ok?'✓ ':'✗ ')+p.name+' — HTTP '+xhr.status+' — '+xhr.responseText.length+' bytes'+(hasStates?' — HAS FLIGHT DATA':''),ok&&hasStates?'ok':ok?'info':'err');
      done++;if(done>=PROXIES.length)add('── ALL DONE ──','info');
    };
    xhr.onerror=function(){add('✗ '+p.name+' — NETWORK ERROR','err');done++;if(done>=PROXIES.length)add('── ALL DONE ──','info');};
    xhr.ontimeout=function(){add('✗ '+p.name+' — TIMEOUT','err');done++;if(done>=PROXIES.length)add('── ALL DONE ──','info');};
    xhr.send();
  },i*2000);
});
</script>
</body>
</html>
